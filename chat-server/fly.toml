# Fly.io config for claudius-chat-server.
#
# Single-region, single small VM. A persistent volume mounted at /data
# holds the SQLite file across deploys / restarts. We force auto_stop
# OFF (and min_machines_running = 1) because SSE clients hold long
# connections — shutting the machine would kick everyone off.
#
# Before first deploy:
#   fly launch --no-deploy --copy-config
#   fly volumes create chat_data --size 1 --region <your-region>
#   fly secrets set CLAUDIUS_CHAT_ADMIN_TOKEN=<long-random-string>
#   fly deploy

app = "claudius-chat-server"
primary_region = "iad"   # change to your nearest region

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8787"
  CHAT_DB_PATH = "/data/chat.db"

[mounts]
  source = "chat_data"
  destination = "/data"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    soft_limit = 200
    hard_limit = 400

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
