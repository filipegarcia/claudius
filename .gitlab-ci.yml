# You can override the included template(s) by including variable overrides
# SAST customization: https://docs.gitlab.com/user/application_security/sast/#available-cicd-variables
# Secret Detection customization: https://docs.gitlab.com/user/application_security/secret_detection/pipeline/configure/
# Dependency Scanning customization: https://docs.gitlab.com/user/application_security/dependency_scanning/dependency_scanning_sbom/#customizing-analyzer-behavior
# Container Scanning customization: https://docs.gitlab.com/user/application_security/container_scanning/#customizing-analyzer-behavior
# Note that environment variables can be set in several places
# See https://docs.gitlab.com/ci/variables/#cicd-variable-precedence
stages:
- test
- secret-detection
- deploy

include:
- template: Security/SAST.gitlab-ci.yml
- template: Security/Secret-Detection.gitlab-ci.yml

variables:
  SECRET_DETECTION_ENABLED: 'true'

sast:
  stage: test

secret_detection:
  stage: secret-detection

.bun_cache: &bun_cache
  cache:
    key:
      files:
        - bun.lock
    paths:
      - node_modules/
      - .bun-cache/
  variables:
    BUN_INSTALL_CACHE_DIR: $CI_PROJECT_DIR/.bun-cache

lint:
  stage: test
  # Use the same node-based image and install path as the `unit` job below.
  # We tried `oven/bun:1 + bun install --frozen-lockfile --ignore-scripts`
  # first — it worked locally but failed in CI with a misleading ESLint
  # error ("could not find plugin react-hooks") that we couldn't trace to a
  # root cause. node+npm is uniform with the unit job, doesn't need build
  # tools (prebuild-install fetches the better-sqlite3 binary), and removes
  # one source of CI-only surprises.
  image: node:22-bookworm-slim
  cache:
    key:
      prefix: npm
      files:
        - bun.lock
    paths:
      - node_modules/
  script:
    - npm install --no-package-lock --no-audit --no-fund
    - npx eslint

# Vitest suite — pure logic, SQLite round-trips, in-process notification bus.
# Runs under node (better-sqlite3 doesn't load under bun yet, see
# vitest.config.ts). Uses `npm install --no-package-lock` so prebuild-install
# downloads the prebuilt better-sqlite3 binary instead of compiling.
#
# Lockfile note: the repo's only lockfile is bun.lock (local toolchain is bun).
# `--no-package-lock` means npm resolves transitive deps fresh each run, so
# this job isn't pinned the way lint/e2e are. Acceptable trade for a unit
# suite — the cost-of-drift is bounded and the suite is fast enough to catch
# breakage quickly. If determinism becomes an issue, commit a parallel
# package-lock.json or switch the job to `npm ci`.
unit:
  stage: test
  image: node:22-bookworm-slim
  cache:
    # Separate key from the bun-flavoured cache — npm and bun produce
    # different on-disk shapes for node_modules, mixing them in one cache
    # would cause subtle install drift between runs.
    key:
      prefix: npm
      files:
        - bun.lock
    paths:
      - node_modules/
  script:
    - npm install --no-package-lock --no-audit --no-fund
    - npx vitest run

e2e:
  stage: test
  image: mcr.microsoft.com/playwright:v1.59.1-jammy
  <<: *bun_cache
  before_script:
    # The Playwright Jammy image ships with Node + the chromium runtime
    # libs but not Bun or make. Install both so `make install` / `make test`
    # use the same toolchain as locally.
    - apt-get update -qq && apt-get install -y --no-install-recommends make curl unzip
    - curl -fsSL https://bun.sh/install | bash
    - export PATH="$HOME/.bun/bin:$PATH" && echo "export PATH=$HOME/.bun/bin:$PATH" >> ~/.bashrc
  script:
    - export PATH="$HOME/.bun/bin:$PATH"
    - make install
    - make test
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 1 week

# Marketing site is published from site/. Screenshots in site/screenshots/
# are committed (generated locally via `make screenshots`), so this job
# just bundles the directory.
pages:
  stage: deploy
  image: alpine:3
  script:
    - 'true'
  pages:
    publish: site
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
