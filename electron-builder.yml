# electron-builder configuration for Claudius desktop app.
# Phase 0 of docs/electron-conversion/PLAN.md.
appId: network.claudius.desktop
productName: Claudius
copyright: Copyright (c) ${author}
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

# Adhoc-sign certless macOS builds so the bundle's signing identity binds the
# real bundle id (network.claudius.desktop) instead of the generic "Electron".
# macOS gates Notification Center delivery on that identity — without this,
# notifications fire in JS but are silently dropped. The hook no-ops for real
# Developer ID signed/notarized builds (electron:dist:mac). See build/after-pack.js.
afterPack: build/after-pack.js

directories:
  buildResources: build
  output: release

# Files included in the asar package. Only the compiled main-process bundle
# lives in the asar — the Next.js standalone server tree is shipped verbatim
# as an extraResource (see below), NOT here. electron-builder strips every
# nested `node_modules/` from `files:` globs (it manages root deps separately),
# which would silently drop the standalone's bundled deps — including the
# Turbopack-hashed external aliases (`better-sqlite3-<hash>`) the server chunks
# `require()` — and native `.node` files can't be dlopen'd from inside an asar
# anyway. extraResources copies with no such filtering, onto the real
# filesystem, so the embedded server resolves and loads them normally.
files:
  - dist-electron/**/*
  - package.json
  - "!**/*.{md,map,d.ts}"
  - "!**/test-utils/**"
  - "!**/__tests__/**"
  - "!**/*.test.{ts,tsx,js,jsx}"
  # Electron e2e runs leave throwaway Chromium profiles under
  # dist-electron/playwright-userdata-<ts>/ (see tests/electron/launch.ts).
  # They contain unix sockets (SingletonSocket) that electron-builder cannot
  # copy into the asar — "Unknown system error -102". Never package them.
  - "!dist-electron/playwright-userdata-*"
  # The Claude Agent SDK and its ~210 MB native CLI binary
  # (@anthropic-ai/claude-agent-sdk-<os>-<arch>/claude) are only imported by
  # the embedded Next server (lib/server/scheduler.ts, session-recap.ts,
  # commit-message.ts, sessions-store.ts) — NOT by the main process. The
  # standalone tree shipped via extraResources already carries its own copy
  # (scripts/electron-stage-standalone.mjs hard-fails the build if the host
  # platform's `claude` binary is missing there). Excluding the root copy
  # here saves ~210 MB per build — otherwise electron-builder follows
  # package.json's `dependencies`, packs the SDK into the asar, and (because
  # of the asarUnpack rule that used to live below) re-locates the platform
  # binary as a NESTED node_modules tree under the SDK package — byte-for-
  # byte duplicating the one already inside standalone/. Run
  # `rg "@anthropic-ai" electron/ dist-electron/` before re-enabling.
  - "!node_modules/@anthropic-ai/claude-agent-sdk/**"
  - "!node_modules/@anthropic-ai/claude-agent-sdk-*/**"

# Native modules and the embedded Next.js binary must live outside the
# asar archive so they can be spawned/required at runtime.
asarUnpack:
  - "**/*.node"
  - "node_modules/better-sqlite3/**"
  - "node_modules/next/**"
  # The platform-specific SWC binding lives at node_modules/@next/swc-<os>-<arch>/.
  # Next eagerly loads it at startup (even with dev:false); if it's missing
  # OR packed inside the asar, Next falls back to a runtime downloader that
  # tries to mkdir into the asar and dies with ENOTDIR — the embedded server
  # never finishes preparing and the window stays blank. Unpacking the whole
  # @next/ scope keeps the package.json + index.js readable next to the
  # .node so Next's loader resolves the dlopen path correctly.
  - "node_modules/@next/**"
  - "node_modules/.bin/next"
  # NB: `node_modules/@anthropic-ai/claude-agent-sdk/**` is intentionally
  # absent — the SDK and its native binary are now shipped only inside the
  # standalone extraResource. See the matching `!` rule under `files:`.

# Anything we ship inside the resources/ folder of the app.
extraResources:
  - from: lib/server/db-migrations
    to: db-migrations
    filter: ["**/*.sql"]
  # The Next.js standalone server tree, copied verbatim to
  # `<app>/Contents/Resources/standalone`. The embedded server
  # (electron/server.ts) runs `next({ dir })` against this path — see
  # `defaultAppDir()`. Shipped here (not in the asar) so its bundled
  # node_modules and native `.node` files survive packaging and load at
  # runtime. `scripts/electron-stage-standalone.mjs` runs before this to copy
  # `.next/static` + `public/` in and materialize Turbopack's symlinked
  # external aliases into real dirs.
  - from: .next/standalone
    to: standalone

# Publish to GitHub Releases by default. Override CSC_*, APPLE_ID,
# APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID in CI.
publish:
  - provider: github
    owner: filipegarcia
    repo: claudius
    releaseType: release

mac:
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  # Rationale strings macOS shows inside its TCC permission dialogs when a
  # process first touches a protected user folder. Without these, the OS
  # dialog says only "Claudius would like to access files in your Desktop
  # folder" — no context for the user about why. With them, the dialog
  # carries the Claudius-authored sentence below.
  #
  # Claudius also tries to surface its OWN heads-up modal BEFORE the OS
  # dialog (see lib/shared/tcc-protected.ts + components/workspaces/
  # DirectoryPicker.tsx), so these strings are the fallback for cases the
  # in-app interception misses (e.g. Bash shell-outs that touch a protected
  # path directly).
  extendInfo:
    NSDesktopFolderUsageDescription: >-
      Claudius needs access to your Desktop folder only when you pick a
      project from there. Files stay on your machine.
    NSDocumentsFolderUsageDescription: >-
      Claudius needs access to your Documents folder only when you pick a
      project from there. Files stay on your machine.
    NSDownloadsFolderUsageDescription: >-
      Claudius needs access to your Downloads folder only when you pick a
      project from there. Files stay on your machine.
    NSRemovableVolumesUsageDescription: >-
      Claudius needs access to removable volumes only when you pick a
      project from one. Files stay on your machine.
    NSNetworkVolumesUsageDescription: >-
      Claudius needs access to network volumes only when you pick a
      project from one. Files stay on your machine.
    NSMicrophoneUsageDescription: >-
      Claudius captures audio from your microphone only while voice
      dictation is active (when you click the mic button in the
      composer). Audio is streamed to Anthropic for live transcription
      and is not stored on your machine.
  # Both archs ship both formats:
  #   • zip   — electron-updater's macOS channel format (auto-update);
  #             one zip per arch is required for arm64 / x64 self-update.
  #   • dmg   — fresh-install download (what users click in Releases).
  #
  # release.yml splits the work into two NATIVE jobs (mac-arm64 + mac-x64) so
  # each arch gets its own clean better-sqlite3 / @next/swc-darwin-* / next
  # standalone rebuild — that's the only way the extraResources standalone
  # tree matches the Electron container's arch. electron-builder doesn't
  # rebuild inside extraResources, so a cross-arch build (e.g. arm64 zip
  # packaged from an x64-standalone .next tree) ships a guaranteed crash —
  # the bundled `claude` SDK binary fails to spawn with EPERM-class errors.
  # That regression shipped as v0.3.168.x's arm64 zip; the split is the fix.
  #
  # Per-arch CLI flags (`electron-builder --mac --arm64`) filter the arch
  # array below to that arch only — so the same YAML config drives both jobs.
  #
  # NB: electron-builder's bundled DMG creator writes only the legacy
  # `backgroundImageAlias`, which macOS 14+ Finder silently ignores — the
  # install window comes up blank-white. We list `dmg` here so electron-builder
  # KNOWS the artifact name (`Claudius-<version>-mac-<arch>.dmg`) for
  # `latest-mac.yml`, but the release pipeline replaces electron-builder's DMG
  # with one produced by `scripts/make-dmg.mjs` (Tarantsov's `create-dmg` bash
  # tool, which drives Finder via AppleScript and produces an alias variant
  # macOS 14+ honours). The fallback in release.yml uses electron-builder's
  # bundled DMG creator only when create-dmg times out.
  target:
    - target: zip
      arch: [arm64, x64]
    - target: dmg
      arch: [arm64, x64]
  icon: build/icons/icon.icns

# `dmg:` settings are intentionally absent — the canonical macOS DMG is
# produced by `scripts/make-dmg.mjs` (Tarantsov's `create-dmg`), which
# carries the equivalent of `background`/`contents` as CLI args. Keep the
# two icon centres (130, 220) and (410, 220) in sync with that script when
# editing — the dashed arrow in build/dmg-background.svg lines up with them.
# The release pipeline only invokes electron-builder's bundled DMG creator
# as a FALLBACK (see release.yml `Package DMG fallback`), and that step
# passes background + window dims via `-c.dmg.*` CLI overrides — so the
# absence of a `dmg:` block here doesn't leave that path broken.

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: build/icons/icon.ico
  signtoolOptions:
    publisherName: Claudius

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

linux:
  category: Development
  synopsis: Claude Code in the browser, now on your desktop
  # Required by the deb/rpm (fpm) targets — package.json `author` is a bare
  # name with no email, which fpm rejects ("specify author 'email'"). Set the
  # Debian/RPM maintainer explicitly here instead of stuffing an address into
  # `author` (which also feeds the ${author} copyright string).
  maintainer: Claudius Network <noreply@claudius.network>
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
    - target: rpm
      arch: [x64]
  icon: build/icons
  desktop:
    entry:
      Name: Claudius
      Comment: Claude Code agent shell
      Categories: Development;IDE;
