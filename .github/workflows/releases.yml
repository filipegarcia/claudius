# Refreshes site/releases.html daily by fetching fresh release data from
# GitHub Releases and npm, then commits the updated page back to main so
# the next pages.yml deploy picks it up automatically.
#
# Also runs:
#   - on push to main when the generator scripts change, and
#   - on push to main when an SDK/cc-parity bump lands (package.json /
#     bun.lock change). The update pipelines stop at "PR ready" and don't
#     merge, so the MERGE is the trigger — this refreshes the page right
#     after a bump merges instead of waiting for the 06:30 UTC run.
# Can also be triggered manually via the Actions tab.
name: refresh-releases-page

on:
  schedule:
    # 06:30 UTC daily — after most overnight deploys have settled
    - cron: '30 6 * * *'
  push:
    branches: [main]
    paths:
      - 'scripts/releases/**'
      # An SDK/cc-parity bump always touches these when it merges.
      - 'package.json'
      - 'bun.lock'
  workflow_dispatch:

# Serialize refreshes so a bump-triggered run and the daily cron (or two
# bumps merging close together) can't race on the `git push` below.
concurrency:
  group: refresh-releases-page
  cancel-in-progress: false

permissions:
  contents: write   # push the updated page back

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r scripts/releases/requirements.txt

      - name: Fetch release data
        run: |
          cd scripts/releases
          # --out writes clean JSON straight to the file; the human report still
          # streams to stdout for the CI log. Do NOT use `> release_data.json` —
          # that captures the report text too and corrupts the JSON.
          python release_analytics.py --out release_data.json --no-color
        env:
          # Use the built-in token for 1 000 req/hr on the Actions runner.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate releases page
        run: |
          cd scripts/releases
          python generate_dashboard.py

      - name: Commit & push if changed
        run: |
          git config user.name  "claudius-bot"
          git config user.email "bot@claudius.network"
          git add scripts/releases/release_data.json site/releases.html
          git diff --staged --quiet && echo "nothing changed" && exit 0
          git commit -m "chore: refresh SDK release analytics [skip ci]"
          git push
