# Release builds for the Claudius desktop app (Electron).
#
# Targets, per the product decision:
#   • macOS arm64 — NATIVE on the arm64 `macos-14` runner. Ships zip + dmg.
#                   Primary target (most current Macs).
#   • macOS x64   — CROSS-COMPILED on the same arm64 `macos-14` runner
#                   (Intel `macos-13` was retired by GitHub). Ships zip + dmg.
#                   The cross-compile rebuilds better-sqlite3 for x64 and
#                   stages `@next/swc-darwin-x64` before `next build`.
#   • Linux x64   — AppImage + deb + rpm. Built on `ubuntu-latest`.
# Windows is intentionally not built here.
#
# The two macOS jobs are intentionally SEPARATE — a single mixed job
# previously rebuilt better-sqlite3 for x64 BEFORE `next build`, then asked
# electron-builder to also produce an arm64 zip. The arm64 zip shipped with
# x64 native modules in its standalone tree and the bundled `claude` SDK
# binary failed to spawn (EPERM-class). Splitting per-arch gives each
# artifact its own internally-consistent standalone tree.
#
# Signing: UNSIGNED / adhoc. There are no Apple Developer credentials wired
# up, so we force `CSC_IDENTITY_AUTO_DISCOVERY=false` and override the
# config's `notarize: true` to `false`. The bundles run locally; on other
# Macs Gatekeeper warns (right-click → Open to bypass). When real
# Developer-ID + notarization creds exist, drop those overrides and pass the
# CSC_* / APPLE_* secrets through instead.
#
# Triggers:
#   • workflow_dispatch — build on demand from the Actions tab.
#   • push of a v* tag  — also attaches the artifacts to the GitHub Release
#     for that tag (create the release first, or this step will create one).
#
# Each job builds NATIVELY on its own runner, so the native-module +
# Next.js-standalone story Just Works (no Docker, no cross-arch rebuilds).
name: release

on:
  workflow_dispatch:
    inputs:
      release:
        description: >
          Release counter (the `.N` component of the version tag, e.g. `5`
          for `v0.3.161.5`). When set, baked into the binary as
          NEXT_PUBLIC_CLAUDIUS_RELEASE so the in-app footer matches the tag
          name exactly. auto-tag.yml passes this from its computed value;
          manual runs can leave it blank and the build will fall back to
          running scripts/claudius-release.mjs against whatever history the
          shallow checkout has (likely returns 0).
        required: false
        type: string
        default: ""
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-arm64:
    name: macOS (Apple Silicon arm64, native)
    runs-on: macos-14
    timeout-minutes: 45
    permissions:
      contents: write
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # better-sqlite3 has prebuilt binaries for node's arm64 ABI but NOT
      # for Electron's arm64 ABI — @electron/rebuild then drives node-gyp
      # to compile from source. node-gyp needs Python's `distutils`, which
      # was REMOVED in Python 3.12 (the macos-14 default). Pin 3.11 so the
      # gyp build succeeds. Same dance the macos-x64 job does — I had the
      # wrong assumption in a previous revision ("arm64 has a prebuilt
      # Electron ABI binary, no python needed") and the macos-arm64 job
      # died here for 7 consecutive releases (v0.3.168.31 → v0.3.168.41).
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # See the macos-x64 job for the full rationale of this cache step.
      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: electron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            electron-${{ runner.os }}-${{ runner.arch }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Host arch IS the target arch — `@next/swc-darwin-arm64` is the
      # binding `bun install` already resolved. No staging needed.

      # Same release-counter resolution as macos-x64 — see that job's
      # `Determine release counter` step for the full rationale.
      - name: Determine release counter for in-app footer
        id: rel
        shell: bash
        run: |
          RELEASE="${{ inputs.release }}"
          if [ -z "$RELEASE" ] && [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\.([0-9]+)$ ]]; then
              RELEASE="${BASH_REMATCH[1]}"
            fi
          fi
          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "Computed release counter: '${RELEASE:-<empty, will fall back to script>}'"

      # Native rebuild for the host (arm64) Electron ABI. Without `--arch`,
      # electron-builder rebuilds for the current host arch, which here is
      # exactly what we want — every native module in the standalone tree
      # (better-sqlite3, etc.) gets the arm64 Electron-ABI binary.
      - name: Rebuild native modules for arm64 (Electron ABI)
        run: |
          bunx electron-builder install-app-deps
          node scripts/native-abi.mjs write electron

      - name: Build Next standalone
        env:
          CLAUDIUS_PACKAGED: "1"
          NODE_ENV: production
          NEXT_PUBLIC_CLAUDIUS_RELEASE: ${{ steps.rel.outputs.release }}
        run: bunx next build

      - name: Stage standalone + compile Electron main
        run: |
          node scripts/electron-stage-standalone.mjs
          bun run electron:compile

      - name: Install create-dmg (for branded DMG)
        run: brew install create-dmg

      # Package arm64 zip, unsigned (adhoc via build/after-pack.js), no notarize.
      # `--arm64` filters electron-builder.yml's mac.target arch arrays to
      # arm64 only. `-c.mac.target=zip` overrides the full target list to
      # exclude the YAML's `dmg` target — we let `create-dmg` produce the
      # branded DMG below instead of electron-builder's blank-background one.
      # The zip pack leaves `release/mac-arm64/Claudius.app/` on disk as a
      # side effect (electron-builder doesn't clean it up), which is exactly
      # what `scripts/make-dmg.mjs --arch=arm64` reads from next.
      - name: Package zip (arm64, unsigned)
        run: bunx electron-builder --mac --arm64 -c.mac.notarize=false -c.mac.target=zip --publish never

      # See make-dmg.mjs for the create-dmg rationale (electron-builder's
      # bundled DMG creator writes a legacy backgroundImageAlias macOS 14+
      # Finder silently ignores). `--arch=arm64` makes the script read
      # `release/mac-arm64/Claudius.app` and write
      # `release/Claudius-<version>-mac-arm64.dmg`.
      - name: Package branded DMG (via create-dmg, arm64)
        id: create-dmg
        continue-on-error: true
        env:
          MAKE_DMG_TIMEOUT_MS: "300000"
          MAKE_DMG_MAX_ATTEMPTS: "3"
        run: node scripts/make-dmg.mjs --arch=arm64

      # Same fallback as macos-x64: blank-background electron-builder DMG
      # when create-dmg times out. Preserves the zip-pointing
      # `latest-mac.yml` across the fallback step.
      - name: Save zip-pointing latest-mac.yml before DMG fallback
        if: steps.create-dmg.outcome == 'failure'
        run: |
          if [ -f release/latest-mac.yml ]; then
            cp release/latest-mac.yml release/latest-mac.yml.zip-manifest
          else
            echo "::error::release/latest-mac.yml missing before DMG fallback — the zip target must have failed silently"
            exit 1
          fi
      - name: Package DMG fallback (electron-builder, CI only)
        if: steps.create-dmg.outcome == 'failure'
        timeout-minutes: 15
        run: |
          echo "::warning::create-dmg failed or timed out — falling back to electron-builder DMG (background blank-white on macOS 14+, icons centered)"
          bunx electron-builder \
            --mac --arm64 \
            --prepackaged release/mac-arm64/Claudius.app \
            -c.mac.target=dmg \
            -c.mac.notarize=false \
            -c.dmg.background=build/background.png \
            -c.dmg.window.width=540 \
            -c.dmg.window.height=380 \
            --publish never
      - name: Restore zip-pointing latest-mac.yml after DMG fallback
        if: steps.create-dmg.outcome == 'failure'
        run: mv release/latest-mac.yml.zip-manifest release/latest-mac.yml

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: claudius-macos-arm64
          # `latest-mac.yml` is included so the `macos-manifest-merge` job
          # downstream can pick up THIS job's arm64-only single-arch
          # manifest and merge it with the x64 job's single-arch manifest
          # into a multi-arch `latest-mac.yml` that lists both archs under
          # one `files:` array (the shape electron-updater expects). See
          # the merge job for the merging script + rationale.
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
          if-no-files-found: error
          retention-days: 14

      - name: Attach artifacts to GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # `latest-mac.yml` is intentionally NOT attached here — it ships
          # from the `macos-manifest-merge` job as a multi-arch combined
          # manifest. Two mac jobs both attaching their own single-arch
          # `latest-mac.yml` would race and electron-updater would see only
          # one arch (the loser's auto-update would be broken).
          files: |
            release/*.dmg
            release/*.zip

  macos-x64:
    name: macOS (Intel x64, cross-compiled)
    # Intel `macos-13` hosted runners no longer schedule (Intel macOS runner
    # retirement), so we CROSS-build x64 on a current Apple Silicon runner.
    runs-on: macos-14
    # Belt-and-braces ceiling. The per-step timeouts below (create-dmg's
    # spawnSync, the fallback step) cover the known hang at `hdiutil create`,
    # but the runner default is 6h — far too long for a build that takes ~15m
    # on a good day. Cap the whole job so a new hang can't burn a runner-hour.
    timeout-minutes: 45
    permissions:
      contents: write # attach artifacts to the Release on tag pushes
    env:
      # Unsigned/adhoc everywhere in this job (no Developer ID). Job-level so
      # the native-rebuild, build, and package steps all skip identity probing.
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # node-gyp compiles better-sqlite3 from source for x64 (no prebuilt for
      # the x64 Electron ABI), and node-gyp needs Python's `distutils`, which
      # was REMOVED in Python 3.12 (the macos-14 default). Pin 3.11, whose
      # stdlib still ships distutils, so the gyp build succeeds.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache the prebuilt Electron binaries electron-builder downloads from
      # github.com/electron/electron/releases. When GitHub's CDN burps with
      # a 504 (as it did on 2026-06-08), a cache hit means we never touch
      # the network and the release sails through. Cache miss only happens
      # on the first run after an Electron version bump (since the key
      # hashes bun.lock — any electron bump changes that file). The actual
      # cache directories vary by platform, so list both macOS and Linux
      # paths here even though only the macOS one is read on this runner —
      # actions/cache silently skips missing paths.
      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: electron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            electron-${{ runner.os }}-${{ runner.arch }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Cross-build crux #2 — @next/swc-darwin-x64.
      #
      # `bun install` on this arm64 host only resolves the optional
      # @next/swc-* package that matches the HOST platform — so we get
      # `@next/swc-darwin-arm64` and never the x64 binding. Next then loads
      # the wrong-arch binary at runtime in the packaged x64 app, falls
      # back to its built-in downloader, and that downloader tries to
      # mkdir inside the read-only asar (`ENOTDIR /…/app.asar/node_modules/
      # next/next-swc-fallback/@next/swc-darwin-x64`). The embedded server
      # never finishes preparing → the BrowserWindow hangs on a blank URL.
      #
      # Stage the x64 binding pinned to the exact Next version so
      # electron-builder packs it (asarUnpack: node_modules/@next/** lives
      # in electron-builder.yml) and the runtime loader never reaches the
      # fallback path.
      #
      # Neither `bun add` nor `npm install` can do this:
      #   • Bun honors the package's declared `cpu`/`os` fields and
      #     SILENTLY skips writing mismatched-platform bindings.
      #   • npm's `--cpu`/`--os` flags only FILTER optionals when the host
      #     matches; on an arm64 host trying to fetch a darwin-x64
      #     package, npm rejects with EBADPLATFORM regardless of flags
      #     (`--force` would downgrade it to a warning, but the install
      #     still skips the tarball).
      # Both behaviors are correct for normal use — they protect users
      # from landing a binary that can't run on their machine. They just
      # actively block what cross-building NEEDS, which is exactly that
      # mismatched binary.
      #
      # So we pull the tarball straight from the registry and unpack it
      # into the spot npm would have. Fully deterministic, no engine
      # checks, no dependency on which package manager's overrides are
      # currently honored.
      #
      # The implementation lives in scripts/electron-stage-next-swc.mjs so
      # local mac builds (`bun run electron:dist:mac` from an arm64 dev
      # machine) get the same staging step — same root cause, same fix,
      # one source of truth. See the script header for the full rationale.
      - name: Stage @next/swc-darwin-x64 (cross-build binding)
        run: node scripts/electron-stage-next-swc.mjs --arch=x64

      # Resolve the .N component of the version tag that the BUILD should
      # bake into the binary's footer. Three input paths, in order:
      #   1. `inputs.release`     — set by auto-tag.yml on its
      #                             `gh workflow run release.yml -f release=N`
      #                             dispatch. Canonical path.
      #   2. parse from tag name  — when triggered by `push: tags: v*`
      #                             (manual `git push origin <tag>`) the
      #                             tag itself is the source of truth.
      #                             Matches the 4-part shape vMAJOR.MINOR.PATCH.RELEASE.
      #   3. empty string         — falls through to next.config.ts's
      #                             script-based fallback (which is wrong
      #                             on shallow CI checkouts → 0). Only
      #                             hit by manual workflow_dispatch with
      #                             no inputs at a non-tag ref.
      # Output consumed by the `Build Next standalone` step's env block.
      - name: Determine release counter for in-app footer
        id: rel
        shell: bash
        run: |
          RELEASE="${{ inputs.release }}"
          if [ -z "$RELEASE" ] && [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\.([0-9]+)$ ]]; then
              RELEASE="${BASH_REMATCH[1]}"
            fi
          fi
          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "Computed release counter: '${RELEASE:-<empty, will fall back to script>}'"

      # CROSS-COMPILE CRUX. The bundled Next.js standalone server ships whatever
      # native better-sqlite3 binary sits in node_modules at `next build` time.
      # On this arm64 host that would be arm64 → the packaged x64 app would
      # crash at runtime loading the wrong-arch .node. So we rebuild the native
      # deps for the **x64 Electron ABI** FIRST, then build. We run the
      # electron:build sub-steps by hand because electron:rebuild-native hard-
      # codes the host arch; `install-app-deps --arch x64` overrides it.
      # (`next build` doesn't dlopen better-sqlite3, so building under arm64
      # node with an x64 binary on disk is fine — same as the Linux job, which
      # builds an Electron-ABI binary under plain node and succeeds.)
      - name: Rebuild native modules for x64 (Electron ABI)
        run: |
          bunx electron-builder install-app-deps --arch x64
          node scripts/native-abi.mjs write electron

      - name: Build Next standalone
        env:
          CLAUDIUS_PACKAGED: "1"
          NODE_ENV: production
          # See `Determine release counter` step. next.config.ts reads
          # this with `||` so an empty string falls through to the
          # script-based fallback — keeps manual non-tag dispatches working.
          NEXT_PUBLIC_CLAUDIUS_RELEASE: ${{ steps.rel.outputs.release }}
        run: bunx next build

      - name: Stage standalone + compile Electron main
        run: |
          node scripts/electron-stage-standalone.mjs
          bun run electron:compile

      # create-dmg (Tarantsov bash tool) drives Finder via AppleScript so the
      # DMG's .DS_Store gets an alias variant macOS 14+ Finder actually honours
      # for the background image. electron-builder's bundled DMG creator only
      # writes a legacy alias that Sonoma/Sequoia/Tahoe Finder silently ignores.
      # See `scripts/make-dmg.mjs` for the rationale.
      - name: Install create-dmg (for branded DMG)
        run: brew install create-dmg

      # Package x64-only, unsigned (adhoc via build/after-pack.js), no notarize.
      # `--x64` filters the YAML mac.target arch arrays to x64 only.
      # `-c.mac.target=zip` overrides the YAML target list to drop the `dmg`
      # entry — we let `create-dmg` produce the branded DMG below instead of
      # electron-builder's blank-background one. The zip pack leaves
      # `release/mac/Claudius.app/` on disk (electron-builder doesn't clean
      # it up), which `scripts/make-dmg.mjs --arch=x64` reads from next.
      - name: Package zip (x64, unsigned)
        run: bunx electron-builder --mac --x64 -c.mac.notarize=false -c.mac.target=zip --publish never

      # Try create-dmg with a per-attempt timeout. On hosted macos-14 runners
      # the underlying `hdiutil create` was hanging indefinitely (v0.3.160.2's
      # job was killed at the 6h GitHub limit, v0.3.161.9 fell back to the
      # blank-background electron-builder DMG). scripts/make-dmg.mjs now
      #   1. uses --filesystem APFS (the same runner produces APFS DMGs
      #      successfully via electron-builder; HFS+ is what hangs);
      #   2. retries up to MAKE_DMG_MAX_ATTEMPTS=3 times with a 5-min ceiling
      #      each (silent hangs aren't caught by create-dmg's built-in
      #      "Resource busy" retry, so we kill-and-retry externally);
      #   3. streams a watchdog showing hdiutil/diskimages-helper/mds/XProtect
      #      process state every 30 s so any future hang isn't blind.
      # Worst case: 3 × 5 min = 15 min before falling back to electron-builder.
      - name: Package branded DMG (via create-dmg, x64)
        id: create-dmg
        continue-on-error: true
        env:
          MAKE_DMG_TIMEOUT_MS: "300000"
          MAKE_DMG_MAX_ATTEMPTS: "3"
        run: node scripts/make-dmg.mjs --arch=x64

      # Fallback: ask electron-builder to make a DMG from the already-packed
      # .app. Verified safe on the macos-14 runner — v0.3.160 and v0.3.160.1
      # both shipped DMGs this way (the create-dmg path only landed in v0.3.160.2).
      # Tradeoffs vs the create-dmg path:
      #   • Background image uses electron-builder's legacy `backgroundImageAlias`
      #     variant that macOS 14+ Finder ignores → install window opens blank-white.
      #   • `dmg.contents` (icon coordinates) intentionally NOT passed: the dotted
      #     CLI (`-c.dmg.contents=…`) stores the JSON as a string instead of an
      #     array (lodash.set quirk) and schema-validation fails at boot. Default
      #     centered icon positions ship instead, slightly off from the background
      #     drag-arrow cues. Both are CI-only degradations — the canonical release
      #     path is `node scripts/make-dmg.mjs` from a developer Mac, which keeps
      #     the proper layout and background.
      #   • `--prepackaged` reuses release/mac/Claudius.app (no rebuild loop).
      #   • CRITICAL: electron-builder re-emits `latest-mac.yml` describing
      #     whatever it just built — here, the DMG. electron-updater on macOS
      #     can only consume a .zip, so a DMG-pointing manifest breaks every
      #     installed client with "ZIP file not provided" (v0.3.161.17 →
      #     v0.3.162.3 all shipped broken this way). The save/restore steps
      #     around this fallback preserve the zip-pointing manifest produced
      #     by the earlier `Package zip` step.
      - name: Save zip-pointing latest-mac.yml before DMG fallback
        if: steps.create-dmg.outcome == 'failure'
        run: |
          if [ -f release/latest-mac.yml ]; then
            cp release/latest-mac.yml release/latest-mac.yml.zip-manifest
          else
            echo "::error::release/latest-mac.yml missing before DMG fallback — the zip target must have failed silently"
            exit 1
          fi
      - name: Package DMG fallback (electron-builder, CI only)
        if: steps.create-dmg.outcome == 'failure'
        timeout-minutes: 15
        run: |
          echo "::warning::create-dmg failed or timed out — falling back to electron-builder DMG (background blank-white on macOS 14+, icons centered)"
          bunx electron-builder \
            --mac --x64 \
            --prepackaged release/mac/Claudius.app \
            -c.mac.target=dmg \
            -c.mac.notarize=false \
            -c.dmg.background=build/background.png \
            -c.dmg.window.width=540 \
            -c.dmg.window.height=380 \
            --publish never
      - name: Restore zip-pointing latest-mac.yml after DMG fallback
        if: steps.create-dmg.outcome == 'failure'
        run: mv release/latest-mac.yml.zip-manifest release/latest-mac.yml

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: claudius-macos-x64
          # Same shape as macos-arm64 — see that job for the full rationale.
          # `latest-mac.yml` rides along so the manifest-merge job can pick
          # up x64's single-arch manifest and combine it with arm64's.
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
          if-no-files-found: error
          retention-days: 14

      - name: Attach artifacts to GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # `latest-mac.yml` is shipped by `macos-manifest-merge` as a
          # multi-arch combined manifest — see that job. Same reasoning as
          # macos-arm64's attach step.
          files: |
            release/*.dmg
            release/*.zip

  # Combine the two single-arch `latest-mac.yml` manifests produced by
  # `macos-arm64` and `macos-x64` into one multi-arch manifest that lists
  # every Mac asset (arm64 + x64, zip + dmg) under a single `files:` array.
  # electron-updater on the user's machine reads that array and picks the
  # entry whose URL suffix matches `process.arch` — so one shipped manifest
  # serves every Mac.
  #
  # Why this job exists (and didn't before the per-arch split): when a
  # SINGLE electron-builder run produced both archs, electron-builder
  # itself wrote one multi-arch manifest. Splitting per-job gives each
  # job its own single-arch manifest, and there's no built-in merge step
  # to combine them — so we do it here.
  #
  # `if: always()` (with the inline if-existence checks below) means even
  # when one arch dies (e.g. the Python/distutils failure that nuked 7
  # arm64 builds before this fix), the merge ships whatever single-arch
  # manifest survived. That's a strictly better than v0.3.168.41's outcome
  # (no manifest at all → auto-update broken for everyone).
  macos-manifest-merge:
    name: macOS manifest merge (latest-mac.yml)
    needs: [macos-arm64, macos-x64]
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Pull just `yaml` — the only dependency the merge script needs.
      # Avoids the full `bun install` on a job that does no app build.
      - name: Install yaml parser
        run: npm install --no-save yaml@2.9.0

      # Both jobs upload their build artifacts under
      # `claudius-macos-<arch>`. Download into per-arch dirs so the merge
      # script can read each `latest-mac.yml` separately. `continue-on-error`
      # because we want the merge to proceed when one job died — see the
      # job-level rationale.
      - name: Download arm64 artifacts
        id: dl-arm64
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          name: claudius-macos-arm64
          path: dist-mac-arm64
      - name: Download x64 artifacts
        id: dl-x64
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          name: claudius-macos-x64
          path: dist-mac-x64

      # Merge the two single-arch manifests into one multi-arch manifest.
      # Output: ./latest-mac.yml ready to attach to the release. Inline
      # because it's a 30-line YAML transform — a standalone script would
      # need its own repo scaffolding for what's effectively a one-shot.
      - name: Merge single-arch manifests
        run: |
          node <<'EOF'
            const fs = require("node:fs");
            const yaml = require("yaml");

            const ARM64 = "dist-mac-arm64/latest-mac.yml";
            const X64 = "dist-mac-x64/latest-mac.yml";

            const have = [
              { arch: "arm64", file: ARM64 },
              { arch: "x64", file: X64 },
            ].filter((m) => {
              const exists = fs.existsSync(m.file);
              if (!exists) console.warn(`::warning::${m.file} missing — ${m.arch} arch will not appear in the merged manifest`);
              return exists;
            });

            if (have.length === 0) {
              console.error("::error::No latest-mac.yml found from either mac job — cannot ship an auto-update manifest");
              process.exit(1);
            }

            const parsed = have.map((m) => ({ ...m, yml: yaml.parse(fs.readFileSync(m.file, "utf8")) }));

            // Sanity: both manifests must agree on version. A mismatch would
            // mean we're combining manifests from different builds (race
            // condition we should never hit, but worth shouting about).
            const versions = new Set(parsed.map((p) => p.yml.version));
            if (versions.size > 1) {
              console.error(`::error::Version mismatch across mac manifests: ${[...versions].join(", ")} — refusing to merge`);
              process.exit(1);
            }

            // Concatenate files arrays, de-dup by url so a re-run doesn't
            // double-list anything.
            const seen = new Set();
            const files = [];
            for (const { yml } of parsed) {
              for (const f of yml.files ?? []) {
                if (seen.has(f.url)) continue;
                seen.add(f.url);
                files.push(f);
              }
            }

            // Pick a primary (`path`/`sha512`) — electron-updater rarely uses
            // it (the per-file array drives arch matching), but it's a
            // required field. Prefer the arm64 zip when available since
            // arm64 is the primary install base; fall back to whatever exists.
            const primaryUrl = files.find((f) => f.url.endsWith("mac-arm64.zip"))?.url
              ?? files.find((f) => f.url.endsWith("mac-x64.zip"))?.url
              ?? files[0]?.url;
            const primary = files.find((f) => f.url === primaryUrl);
            if (!primary) {
              console.error("::error::No primary zip entry found in merged manifest — electron-updater requires one");
              process.exit(1);
            }

            // Prefer the arm64 yml as the base for top-level keys
            // (releaseDate, version), fall back to whichever survived.
            const base = parsed.find((p) => p.arch === "arm64")?.yml ?? parsed[0].yml;

            const merged = {
              version: base.version,
              files,
              path: primary.url,
              sha512: primary.sha512,
              releaseDate: base.releaseDate,
            };

            fs.writeFileSync("latest-mac.yml", yaml.stringify(merged));
            console.log("Merged manifest:");
            console.log(fs.readFileSync("latest-mac.yml", "utf8"));
          EOF

      - name: Attach merged latest-mac.yml to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: latest-mac.yml

  linux-x64:
    name: Linux (x64)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # rpm packaging needs the `rpm`/`rpmbuild` toolchain; deb + AppImage
      # tooling are either present on the runner or fetched by electron-builder.
      - name: Install rpm tooling
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends rpm

      # See the macos-x64 job for the rationale. Same shape, different
      # platform-specific cache dirs.
      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            electron-${{ runner.os }}-${{ runner.arch }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # See the macos-x64 job's "Determine release counter" step for the
      # full rationale — same input resolution, same fallback semantics.
      - name: Determine release counter for in-app footer
        id: rel
        shell: bash
        run: |
          RELEASE="${{ inputs.release }}"
          if [ -z "$RELEASE" ] && [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\.([0-9]+)$ ]]; then
              RELEASE="${BASH_REMATCH[1]}"
            fi
          fi
          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "Computed release counter: '${RELEASE:-<empty, will fall back to script>}'"

      - name: Build (Next standalone + Electron main)
        env:
          # next.config.ts inlines this into the bundle as
          # NEXT_PUBLIC_CLAUDIUS_RELEASE so the workspace-rail footer
          # matches the GitHub release tag. `||` in next.config.ts treats
          # an empty string as "not set" so this is safe to leave blank
          # on manual non-tag dispatches.
          NEXT_PUBLIC_CLAUDIUS_RELEASE: ${{ steps.rel.outputs.release }}
        run: bun run electron:build

      - name: Package AppImage + deb + rpm (x64)
        run: bunx electron-builder --linux --x64 --publish never

      # electron-builder embeds the classic AppImage runtime, which dynamically
      # links libfuse2. Ubuntu 23.10+/24.04 dropped libfuse2 from the default
      # install, so the stock AppImage dies at launch with
      # "dlopen(): error loading libfuse.so.2". Swap the runtime for the static
      # type2-runtime (bundles its own squashfuse) so the AppImage just runs.
      - name: Make AppImage FUSE-free (static runtime)
        run: node scripts/appimage-fuseless.mjs release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: claudius-linux-x64
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/latest-linux.yml
          if-no-files-found: error
          retention-days: 14

      - name: Attach to GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # latest-linux.yml is the electron-updater feed manifest. It's
          # resynced to the FUSE-free AppImage by scripts/appimage-fuseless.mjs
          # (the swap changes the AppImage's sha512), so it must be the version
          # produced by that step — which it is, since this runs after it.
          files: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/latest-linux.yml

  # Post-build smoke: actually LAUNCH the AppImage we just shipped and assert
  # the window comes up + the embedded server answers. The dev-server-backed
  # `chromium-electron` Playwright project never runs the real artifact, so a
  # packaging/sandbox regression (e.g. the AppImage chrome-sandbox crash) is
  # invisible to it and only surfaces when a user double-clicks the download.
  # This job closes that gap. It does NOT gate the release attach above (the
  # linux-x64 job attaches on tag pushes); it's a loud red signal that the
  # shipped binary is broken. To make it BLOCK the release, move the attach
  # step into a final job that `needs: [linux-x64, linux-smoke]`.
  linux-smoke:
    name: Linux AppImage smoke (launch test)
    needs: linux-x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # @playwright/test (the `_electron` launcher) is a devDependency. No
      # browser binaries are needed — we drive the AppImage's OWN bundled
      # Electron, not a downloaded Chromium — so `playwright install` is skipped.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Linux artifacts
        uses: actions/download-artifact@v5
        with:
          name: claudius-linux-x64
          path: dist-linux

      # The electron-updater feed manifest (latest-linux.yml) must describe the
      # SHIPPED AppImage — but the runtime swap rewrote it after electron-builder
      # hashed it, so scripts/appimage-fuseless.mjs resynced the manifest. Verify
      # they actually match: a stale sha512/size makes auto-update download then
      # reject the update as corrupt — exactly the regression to guard.
      - name: Verify latest-linux.yml matches the shipped AppImage
        run: |
          node -e '
            const crypto=require("crypto"),fs=require("fs"),{parse}=require("yaml");
            const dir=process.env.GITHUB_WORKSPACE+"/dist-linux";
            const ymlPath=dir+"/latest-linux.yml";
            if(!fs.existsSync(ymlPath)){console.error("::error::latest-linux.yml missing from the release artifacts — Linux auto-update feed not shipped");process.exit(1);}
            const yml=parse(fs.readFileSync(ymlPath,"utf8"));
            const app=fs.readdirSync(dir).find(f=>f.endsWith(".AppImage"));
            const buf=fs.readFileSync(dir+"/"+app);
            const sha=crypto.createHash("sha512").update(buf).digest("base64");
            const entry=(yml.files||[]).find(f=>f.url===app)||{};
            const ok = yml.sha512===sha && entry.sha512===sha && entry.size===buf.length;
            if(!ok){console.error("::error title=Stale update manifest::latest-linux.yml sha512/size do not match the shipped AppImage — auto-update would reject the download.",JSON.stringify({app,ymlSha:yml.sha512,entrySha:entry.sha512,actualSha:sha,entrySize:entry.size,actualSize:buf.length}));process.exit(1);}
            console.log("OK: latest-linux.yml sha512+size match the shipped AppImage ("+buf.length+" bytes)");
          '

      # xvfb gives the headless runner the X display Electron's Ozone/X11
      # init demands. No libfuse needed: we self-EXTRACT the AppImage
      # (`--appimage-extract`, handled by the AppImage runtime's built-in
      # unsquashfs, not FUSE) and launch the unpacked Electron binary
      # directly. That keeps Playwright on its proven control path (a plain
      # packaged Electron binary, same as the `chromium-electron` suite)
      # instead of driving a FUSE-mounted image.
      - name: Install headless display runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xvfb

      # Force the exact condition the AppImage sandbox bug needs to reproduce:
      # with unprivileged user namespaces restricted, Chromium MUST fall back
      # to the setuid sandbox — which an AppImage can't provide (chrome-sandbox
      # is read-only on the squashfs mount). A build that doesn't pass
      # --no-sandbox for the AppImage case then aborts at launch; the fix in
      # electron/main.ts makes it launch anyway. The sysctl name varies by
      # kernel, so we set both best-effort, then VERIFY the restriction
      # actually took — otherwise a green run could just mean "userns was
      # available and saved us," silently masking a dropped-fix regression.
      - name: Restrict unprivileged user namespaces (reproduce sandbox bug)
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=1 2>/dev/null || true
          sudo sysctl -w kernel.unprivileged_userns_clone=0 2>/dev/null || true
          # If unshare still succeeds, Chromium's namespace sandbox works and
          # the AppImage would launch even WITHOUT the fix — i.e. this run did
          # not actually exercise the sandbox dimension. Make that loud rather
          # than letting a false-green slip through.
          if unshare --user true 2>/dev/null; then
            echo "::warning title=Sandbox dimension not exercised::Unprivileged user namespaces are still available on this runner — Chromium's namespace sandbox works, so the AppImage would launch even if the electron/main.ts --no-sandbox fix were removed. This run validates that the app BOOTS, but does NOT guard the sandbox regression. (The kernel didn't honor the restriction sysctls.)"
          else
            echo "Confirmed: unprivileged user namespaces are restricted — the AppImage sandbox path IS exercised this run."
          fi

      # End-to-end: run the REAL .AppImage the way a user does — let its runtime
      # mount the squashfs and exec the app. With the static type2-runtime swap
      # (scripts/appimage-fuseless.mjs) this MUST work without libfuse2, which we
      # deliberately never install. The AppImage runtime exports $APPIMAGE, so
      # after-pack.js's wrapper also adds --no-sandbox — so this one check covers
      # BOTH the FUSE fix and the sandbox fix via the true double-click path.
      - name: Real AppImage launch (FUSE-free + sandbox, end-to-end)
        run: |
          if ldconfig -p 2>/dev/null | grep -q 'libfuse\.so\.2'; then
            echo "::warning title=libfuse2 present::libfuse2 IS installed on this runner — a FUSE-free regression would be masked. The static-runtime fix isn't truly exercised this run."
          else
            echo "Confirmed: libfuse2 absent — the AppImage runtime must be self-sufficient to mount."
          fi
          APP="$(ls "$PWD"/dist-linux/*.AppImage 2>/dev/null | head -1)"
          if [ -z "$APP" ]; then echo "::error::no .AppImage under dist-linux/"; exit 1; fi
          chmod +x "$APP"
          set +e
          xvfb-run -a "$APP" --user-data-dir="$(mktemp -d)" > realrun.log 2>&1 &
          APP_PID=$!
          sleep 25
          kill "$APP_PID" 2>/dev/null
          pkill -f "$(basename "$APP")" 2>/dev/null || true
          pkill -f "\.mount_" 2>/dev/null || true
          set -e
          echo "--- real AppImage launch output ---"; cat realrun.log || true; echo "-----------------------------------"
          if grep -qiE "libfuse\.so\.2|AppImages require FUSE" realrun.log; then
            echo "::error title=AppImage still needs FUSE2::The shipped AppImage depends on libfuse2 — the static-runtime swap didn't take. Stock Ubuntu 24.04 users can't launch it."
            exit 1
          fi
          if grep -qiE "setuid_sandbox_host|SUID sandbox helper|The SUID sandbox" realrun.log; then
            echo "::error title=Sandbox abort::Real AppImage launch hit the setuid-sandbox FATAL."
            exit 1
          fi
          if ! grep -q "\[electron/main\] boot" realrun.log; then
            echo "::error title=Never reached JS::Real AppImage launch produced no [electron/main] boot marker — it didn't start. See output above."
            exit 1
          fi
          echo "OK: real AppImage mounted without libfuse2 and booted with no sandbox abort."

      # Self-extract (no FUSE) and resolve the launch entry points. We dump the
      # AppRun + dir listing UNCONDITIONALLY here, before any step that can
      # fail, so if the pre-check goes red the AppRun contents are already in
      # the log to show whether it invokes our --no-sandbox wrapper (claudius)
      # or bypasses it.
      - name: Extract AppImage
        run: |
          APPIMAGE_PATH="$(ls "$PWD"/dist-linux/*.AppImage 2>/dev/null | head -1)"
          if [ -z "$APPIMAGE_PATH" ]; then
            echo "::error::no .AppImage found under dist-linux/ — the linux-x64 build artifact is missing or misnamed"
            exit 1
          fi
          echo "Extracting AppImage: $APPIMAGE_PATH"
          chmod +x "$APPIMAGE_PATH"
          "$APPIMAGE_PATH" --appimage-extract >/dev/null
          echo "=== ls -la squashfs-root/ ==="
          ls -la "$PWD/squashfs-root" || true
          echo "=== cat squashfs-root/AppRun ==="
          cat "$PWD/squashfs-root/AppRun" 2>/dev/null || echo "(AppRun not a readable file — may be a binary)"
          echo "============================="
          APPRUN="$PWD/squashfs-root/AppRun"
          # CLAUDIUS_PACKAGED_BINARY is the executable Playwright launches — the
          # after-pack.js wrapper, installed at the productName-derived name.
          BIN="$PWD/squashfs-root/claudius"
          if [ ! -e "$BIN" ]; then
            echo "::warning::expected wrapper at $BIN not found; Playwright smoke may fail"
          fi
          if [ ! -x "$APPRUN" ]; then
            echo "::error::no executable AppRun under squashfs-root/ — cannot test the real launch path"
            exit 1
          fi
          echo "AppRun: $APPRUN ; wrapper: $BIN"
          # APPIMAGE/APPDIR mimic what the AppImage runtime exports at launch.
          # The after-pack.js wrapper keys on APPIMAGE to add --no-sandbox, so
          # setting it makes the extracted tree take the real double-click path.
          {
            echo "CLAUDIUS_PACKAGED_BINARY=$BIN"
            echo "CLAUDIUS_APPRUN=$APPRUN"
            echo "APPIMAGE=$APPIMAGE_PATH"
            echo "APPDIR=$PWD/squashfs-root"
          } >> "$GITHUB_ENV"

      # Pre-check: launch through AppRun — the SAME entry a double-clicked
      # AppImage uses — with APPIMAGE set, so the after-pack.js wrapper's
      # --no-sandbox path is exercised end to end (AppRun → wrapper → binary).
      # We can't gate on exit code (we kill it), so success is two signals:
      #   1. no setuid-sandbox FATAL in the output, AND
      #   2. the [electron/main] boot marker IS present — proving our JS ran
      #      (a clean launch), not that it merely avoided crashing some other way.
      - name: Pre-check — AppRun launch must not hit the sandbox abort
        run: |
          set +e
          xvfb-run -a "$CLAUDIUS_APPRUN" --user-data-dir="$(mktemp -d)" > precheck.log 2>&1 &
          APP_PID=$!
          # Long enough for an immediate sandbox abort (~1s) or a full
          # embedded-server boot to surface in the log.
          sleep 20
          kill "$APP_PID" 2>/dev/null
          # Reap any forked Electron children so the step can exit.
          pkill -f "$PWD/squashfs-root" 2>/dev/null || true
          set -e
          echo "--- AppRun launch output ---"
          cat precheck.log || true
          echo "----------------------------"
          if grep -qiE "setuid_sandbox_host|SUID sandbox helper|The SUID sandbox" precheck.log; then
            echo "::error title=AppImage sandbox abort::AppRun launch still hit the setuid-sandbox FATAL — the after-pack.js --no-sandbox wrapper isn't on AppRun's launch path. See the 'cat AppRun' output in the Extract step."
            exit 1
          fi
          if ! grep -q "\[electron/main\] boot" precheck.log; then
            echo "::error title=App never reached JS::No [electron/main] boot marker in the AppRun launch output — the app didn't start cleanly. Inspect the AppRun contents + output above."
            exit 1
          fi
          echo "OK: AppRun launch reached JS with no setuid-sandbox abort."

      - name: Smoke-test the packaged app (Playwright)
        run: xvfb-run -a bun run test:e2e:electron-packaged

      - name: Upload smoke trace on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: linux-smoke-trace
          path: |
            test-results/**
            playwright-report/**
            precheck.log
            realrun.log
          if-no-files-found: ignore
          retention-days: 7
