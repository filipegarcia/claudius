# Auto-tag every push to main with `v<sdk-version>.<N>`, where N is a
# PER-RELEASE ordinal: the first release at an SDK version is `.0`, the next
# `.1`, `.2`, … Same scheme `lib/shared/version.ts` shows in the UI.
#
# Why per-release (not per-commit):
#   - `package.json`'s `version` mirrors the Claude Agent SDK version the
#     orchestrator most recently bumped to (3-part semver, capped by
#     electron-builder + macOS notarization).
#   - This workflow fires once per push to main and mints exactly ONE tag, so
#     N increments by ONE per push regardless of how many commits that push
#     carried. The previous scheme counted COMMITS, so an 8-commit push jumped
#     the line by 8 (e.g. `.5` → `.13`), and a 14-commit batch produced the
#     surprising `v0.3.175.0` → `v0.3.175.14` gap.
#
# How N is chosen:
#   - List the existing `v<version>.*` tags on origin (this workflow is their
#     only creator, so they ARE the release ledger).
#   - N = highest existing `.N` for this version, plus 1. No tags yet → N = 0
#     (the first release at a freshly-bumped SDK version).
#   - Bumping the SDK (`version` changes) resets the series automatically:
#     there are no `v<new-sdk>.*` tags, so the next push is `.0`. No stored
#     counter, no anchor commit to bootstrap.
#
# Idempotency:
#   If HEAD is ALREADY released — some `v<version>.N` points at this commit —
#   the run is a no-op. Covers reruns, force-pushes that don't move the tip,
#   and the GITHUB_TOKEN tag-push below (which doesn't re-trigger this
#   workflow, but a manual re-dispatch shouldn't double-tag). We check HEAD
#   against the FULL `ls-remote` output (including the `^{}` peel lines) so
#   annotated tags — whose commit SHA lives on the peel line — are detected.
#
# Downstream trigger:
#   GITHUB_TOKEN-pushed tag events DO NOT trigger downstream workflows
#   (GitHub's recursion guard). So a plain `git push origin <tag>` here would
#   never fire release.yml. `workflow_dispatch` is exempt, so we explicitly
#   `gh workflow run release.yml --ref <tag> -f release=<N>`. Under that
#   dispatch release.yml sees `github.ref = refs/tags/<tag>` and its
#   `if: startsWith(github.ref, 'refs/tags/')` upload step fires; it bakes the
#   passed `<N>` into the in-app footer.
#
#   (We tag HEAD, whose `.github/workflows/` content IS main's HEAD, so the
#   GITHUB_TOKEN tag-push is never rejected by the workflow-file-permission
#   rule that blocked the old bootstrap-an-old-anchor step.)
#
# Concurrency:
#   QUEUE concurrent main-push runs (cancel-in-progress: false). They must
#   serialize — two pushes each need to compute N against the other's freshly
#   pushed tag, or they'd collide on the same number.
#
# Trade-off the user signed off on:
#   Every push to main triggers release.yml — a full macOS + Linux Electron
#   build, ~15-45 min of runner time per push. That's the cost of "one release
#   per push to main."
name: auto-tag

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: auto-tag
  cancel-in-progress: false

permissions:
  contents: write # create + push tags
  actions: write # workflow_dispatch release.yml

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history + tags. checkout@v5 fetches tags at fetch-depth: 0;
          # we also query origin directly below so a missing local tag can't
          # skew the ordinal.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Compute version + next release ordinal
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -e 'process.stdout.write(require("./package.json").version)')
          HEAD_SHA=$(git rev-parse HEAD)

          # Authoritative tag ledger straight from origin. Lines look like:
          #   <sha>\trefs/tags/vX.Y.Z.N        (tag object, or commit for a lightweight tag)
          #   <commit-sha>\trefs/tags/vX.Y.Z.N^{}   (peel: the commit an annotated tag points to)
          ALL=$(git ls-remote --tags origin "v${VERSION}.*" || true)

          # Idempotency: HEAD already released? Match against the FULL output
          # (the ^{} peel carries the commit SHA for annotated tags).
          if printf '%s\n' "$ALL" | grep -q "^${HEAD_SHA}"; then
            echo "HEAD ${HEAD_SHA} already carries a v${VERSION}.* tag — nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Next ordinal = highest existing .N + 1, or 0 if none. Parse names
          # from the non-peel lines so the trailing component is the bare N.
          TAGS=$(printf '%s\n' "$ALL" | grep -v '\^{}' || true)
          MAX=-1
          while IFS=$'\t' read -r _sha ref; do
            [ -z "${ref:-}" ] && continue
            tag="${ref#refs/tags/}"      # vX.Y.Z.N
            n="${tag##*.}"               # N
            case "$n" in ''|*[!0-9]*) continue ;; esac
            if [ "$n" -gt "$MAX" ]; then MAX="$n"; fi
          done < <(printf '%s\n' "$TAGS")
          NEXT=$(( MAX + 1 ))
          TAG="v${VERSION}.${NEXT}"

          {
            echo "version=$VERSION"
            echo "release=$NEXT"
            echo "tag=$TAG"
            echo "skip=false"
          } >> "$GITHUB_OUTPUT"
          echo "Next release: $TAG (highest existing .N was ${MAX})"

      - name: Configure git identity for tagging
        if: steps.ver.outputs.skip != 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Create release tag + dispatch build
        if: steps.ver.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"
          # Race guard: a concurrently-queued run may have just created it.
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "$TAG already exists on origin; nothing to do."
            exit 0
          fi
          SUBJECT=$(git log -1 --format=%s)
          echo "Creating $TAG at $(git rev-parse HEAD) ($SUBJECT)"
          git tag -a "$TAG" -m "Claudius $TAG — $SUBJECT"
          git push origin "$TAG"
          # GITHUB_TOKEN tag-push doesn't auto-trigger downstream workflows;
          # workflow_dispatch does. Pass the ordinal so release.yml bakes the
          # correct in-app footer.
          gh workflow run release.yml --ref "$TAG" -f release="${{ steps.ver.outputs.release }}"
