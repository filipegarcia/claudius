# Mirror of the test stage from .gitlab-ci.yml — kept intentionally close in
# image and command choices so the CI behavior matches what we run locally
# and what GitLab still runs (for the secondary mirror).
#
# Jobs:
#   - lint:          ESLint over the repo
#   - unit:          Vitest suite (Node-side; SQLite roundtrips, pure logic)
#   - build:         `next build` — the ONLY job that type-checks the repo
#   - setup-script:  bash/zsh/fish-matrix smoke for site/setup.sh
#   - e2e:           Playwright suite (heaviest; caches Bun + node_modules)
#
# Pages deploy is a separate workflow (.github/workflows/pages.yml).
# Code scanning is wired up in .github/workflows/codeql.yml.
name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel stale runs when a new commit lands on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ESLint. Uses node+npm (not Bun) for parity with the unit job — see the
  # long-form rationale in .gitlab-ci.yml's `lint` block.
  lint:
    runs-on: ubuntu-latest
    container: node:22-bookworm-slim
    steps:
      - uses: actions/checkout@v5
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: npm install --no-package-lock --no-audit --no-fund
      - run: npx eslint

  # Vitest. Runs under node — better-sqlite3 doesn't load under bun yet,
  # see vitest.config.ts.
  #
  # IMPORTANT: node:22-bookworm-slim does NOT ship git. tests/unit/updater-is-
  # ancestor.test.ts spawns `git` directly via execFileSync to set up real temp
  # repos (the only honest way to pin `git merge-base --is-ancestor`'s exit-1-
  # is-also-a-valid-answer semantics). Without git on PATH that test fails with
  # `spawnSync git ENOENT` and the whole unit job goes red. Install git BEFORE
  # checkout — actions/checkout otherwise falls back to the tarball API which
  # populates files but leaves no usable git binary in the container.
  unit:
    runs-on: ubuntu-latest
    container: node:22-bookworm-slim
    steps:
      - name: Pre-install git so unit tests can spawn it
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends git ca-certificates
      - uses: actions/checkout@v5
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: npm install --no-package-lock --no-audit --no-fund
      - run: npx vitest run

  # Production build. This is the ONLY CI job that type-checks the repo:
  # `next build` runs tsc (tsconfig `ignoreBuildErrors: false`) before it
  # compiles. lint and unit both pass on code that doesn't type-check, so
  # without this job a type error reaches main unnoticed — which is exactly
  # what happened: a `let` declared inside a `try` block but read in the
  # `finally` ("Cannot find name …") shipped to main because the only thing
  # that ran `next build` was the SDK-updater's local gate on a cron host,
  # not CI. This job closes that gap.
  #
  # Uses bun (the build script and lockfile are bun's) on the slim node image
  # + git. git is needed because `next build` shells out to
  # scripts/claudius-release.mjs to derive the displayed release counter from
  # commit history; `fetch-depth: 0` gives it the full history it wants (the
  # script degrades to 0 without it, so the build never FAILS for lack of
  # history — but an accurate counter is free here).
  build:
    runs-on: ubuntu-latest
    container: node:22-bookworm-slim
    env:
      BUN_INSTALL_CACHE_DIR: ${{ github.workspace }}/.bun-cache
    steps:
      - name: Pre-install git + curl/unzip (for checkout history + bun install)
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends git ca-certificates curl unzip
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Mark workspace safe for git (container runs as root)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Cache node_modules + bun cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            .bun-cache
          # Job-scoped key. MUST stay distinct from the e2e job's key:
          # `node_modules` here holds native modules (better-sqlite3) compiled
          # against THIS job's Node (node:22-bookworm-slim). The e2e job runs
          # a different Node (Playwright image), so sharing one cache entry
          # makes whichever job saves first poison the other — better-sqlite3
          # then fails with "Module did not self-register / ERR_DLOPEN_FAILED"
          # and the whole e2e webServer can't boot. Keep these caches isolated.
          key: bun-build-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      # Same retry-wrapped bun install as the e2e job: `curl bun.sh/install`
      # fetches a binary from github.com/oven-sh releases, which has 504'd
      # before and would otherwise redden the whole job before it builds.
      - name: Install bun
        run: |
          set -e
          for attempt in 1 2 3 4 5; do
            if curl -fsSL https://bun.sh/install | bash; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "::error::bun install failed after 5 attempts (probably a transient github.com 504)"
              exit 1
            fi
            wait=$((attempt * 10))
            echo "::warning::bun install attempt $attempt failed; retrying in ${wait}s"
            sleep "$wait"
          done
          test -x "$HOME/.bun/bin/bun"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Build (next build — type-checks then compiles)
        run: bun run build

  # site/setup.sh smoke test. Boots a fresh Ubuntu container with the three
  # supported shells installed, then runs the same in-rig assertion script
  # that `make test-setup-docker` runs locally.
  #
  # IMPORTANT: ubuntu:24.04 is a minimal image with no git. If actions/checkout
  # runs without git on PATH it falls back to the GitHub tarball API, which
  # populates the workspace but writes NO .git directory — and the in-rig
  # clone later needs a real git checkout. So we install git BEFORE checkout.
  #
  # GitHub's actions/checkout leaves the workspace in a detached state with
  # only the target SHA fetched. setup.sh's `git clone --branch X` against
  # the workspace needs refs/heads/X to exist, so we materialize one.
  setup-script:
    runs-on: ubuntu-latest
    container: ubuntu:24.04
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Pre-install git so actions/checkout produces a real .git dir
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends git ca-certificates
      - uses: actions/checkout@v5
      - name: Install bash, zsh, fish, curl
        run: |
          apt-get install -y --no-install-recommends bash zsh fish curl
      - name: Materialize a branch ref for the in-rig clone
        run: |
          # actions/checkout writes to $GITHUB_WORKSPACE as a non-root user,
          # but the container job runs as root — mark the dir safe so git
          # will operate on it.
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git -C "$GITHUB_WORKSPACE" update-ref refs/heads/__ci-setup-test "$(git -C "$GITHUB_WORKSPACE" rev-parse HEAD)"
      - name: Run setup-script assertions
        run: |
          TEST_SRC="$GITHUB_WORKSPACE" TEST_BRANCH=__ci-setup-test \
            bash site/test/test-in-docker.sh

  # Playwright. Uses the official Playwright image (browsers + system libs
  # pre-installed) and layers Bun + make on top so `make install` / `make test`
  # use the same toolchain as locally.
  e2e:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.59.1-jammy
    env:
      BUN_INSTALL_CACHE_DIR: ${{ github.workspace }}/.bun-cache
    steps:
      - uses: actions/checkout@v5
      - name: Cache node_modules + bun cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            .bun-cache
          # Job-scoped key — see the build job's cache note. This `node_modules`
          # holds better-sqlite3 compiled against the Playwright image's Node;
          # the build job's is compiled against node:22-bookworm-slim. They
          # must NOT share a cache entry or the native module fails to load.
          key: bun-e2e-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      # `curl https://bun.sh/install | bash` ultimately fetches
      # bun-linux-x64.zip from github.com/oven-sh/bun/releases. When GitHub's
      # releases CDN burps with a 504 (as it did on 2026-06-08 ~06:40 UTC),
      # the install script dies and the whole e2e job fails before a single
      # test runs. Retry the install up to 5 times with linear backoff so a
      # transient 5xx doesn't redden CI. Idempotent: each attempt
      # re-downloads the install script and re-attempts the binary fetch.
      - name: Install bun + make
        run: |
          set -e
          apt-get update -qq
          apt-get install -y --no-install-recommends make curl unzip
          for attempt in 1 2 3 4 5; do
            if curl -fsSL https://bun.sh/install | bash; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "::error::bun install failed after 5 attempts (probably a transient github.com 504)"
              exit 1
            fi
            wait=$((attempt * 10))
            echo "::warning::bun install attempt $attempt failed; retrying in ${wait}s"
            sleep "$wait"
          done
          test -x "$HOME/.bun/bin/bun"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
      - name: Install deps
        run: make install
      - name: Run Playwright suite
        run: make test
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
